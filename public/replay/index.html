<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinnTrack – Replay</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #eee; }
    .brand { font-size: 22px; font-weight: 800; }
    nav a { margin-left: 12px; text-decoration:none; color:#06c; }
    nav a.active { color: var(--brand); }
    #app { display:flex; height: calc(100vh - 58px); }
    #sidebar { width: 320px; padding: 12px; border-right:1px solid #eee; overflow:auto; }
    #map { flex:1; }
    .section-title { font-weight:700; margin-bottom: 6px; }
    select, button { width:100%; padding: 8px; margin: 6px 0; }
    #boatsList { margin: 8px 0 0 18px; font-family: monospace; font-size: 12px; white-space: pre-line; }
    .row { display:flex; gap:8px; }
    .row button { width: 50%; }
    .controls {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 12px;
      margin: 8px 0;
    }
    .playback-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }
    .time-slider {
      flex: 1;
      margin: 0 8px;
    }
    .time-display {
      font-family: monospace;
      font-size: 12px;
      margin: 4px 0;
    }
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .speed-control input {
      flex: 1;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin: 8px 0;
      font-size: 12px;
    }
    .status.loading { background: #fff3cd; color: #856404; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
  </style>
</head>

<body>
<header>
  <div class="brand">FinnTrack</div>
  <nav>
    <a href="/">Home</a>
    <a href="/live">Live</a>
    <a href="/replay" class="active">Replay</a>
    <a href="/analytics">Analytics</a>
  </nav>
</header>

<div id="app">
  <div id="sidebar">
    <div class="section-title">Race Replay</div>
    <div id="connectionStatus">📺 Ready to replay</div>

    <hr />

    <div>Race:</div>
    <select id="raceSelect">
      <option value="">Loading races...</option>
    </select>
    <button id="loadRaceBtn">Load Race Data</button>

    <div class="controls">
      <div class="section-title">Playback Controls</div>

      <div class="playback-controls">
        <button id="playPauseBtn" disabled>▶️ Play</button>
        <button id="stopBtn" disabled>⏹️ Stop</button>
        <button id="resetBtn">⏮️ Reset</button>
      </div>

      <input type="range" id="timeSlider" class="time-slider" min="0" max="100" value="0" disabled>

      <div class="time-display">
        <div>Time: <span id="currentTime">--:--:--</span></div>
        <div>Duration: <span id="totalTime">--:--:--</span></div>
      </div>

      <div class="speed-control">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
        <span id="speedDisplay">1.0x</span>
      </div>
    </div>

    <hr />

    <div>Follow Boat:</div>
    <select id="followSelect">
      <option value="">-- All boats --</option>
    </select>

    <div class="row">
      <button id="followBtn">Follow</button>
      <button id="resetViewBtn">Reset View</button>
    </div>

    <hr />

    <div class="section-title">Boats</div>
    <div id="boatsList">(select race to load data)</div>

    <div id="status" class="status" style="display: none;"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/config.js"></script>
<script src="/js/map.js"></script>
<script src="/js/api.js"></script>
<script src="/js/replay.js"></script>
</body>
</html>
