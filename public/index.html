<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinnTrack – Live</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #f4f6f8; }

    /* ── Header ───────────────────────────────── */
    header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      position: relative;
      z-index: 400;
    }
    .brand { font-size: 22px; font-weight: 800; color: #0066cc; letter-spacing: -0.5px; }

    #pill {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: #eee;
      color: #555;
      transition: background .3s, color .3s;
    }
    #pill.live    { background: #d4edda; color: #155724; }
    #pill.polling { background: #fff3cd; color: #856404; }
    #pill.error   { background: #f8d7da; color: #721c24; }

    /* ── Layout ───────────────────────────────── */
    .wrap {
      display: flex;
      height: calc(100vh - 48px);
    }

    /* ── Sidebar ──────────────────────────────── */
    aside {
      width: 260px;
      min-width: 260px;
      background: #fff;
      border-right: 1px solid #dde1e7;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .aside-head {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #888;
      border-bottom: 1px solid #f0f0f0;
    }
    #boatList {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .brow {
      padding: 10px 14px;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background .12s;
    }
    .brow:hover  { background: #f0f7ff; }
    .brow:active { background: #ddeeff; }
    .brow-name { font-weight: 700; font-size: 14px; color: #0066cc; }
    .brow-sail { font-size: 11px; color: #888; margin-left: 4px; }
    .brow-meta { font-size: 12px; color: #666; margin-top: 2px; }
    .empty { padding: 20px 14px; text-align: center; color: #aaa; font-size: 13px; }

    /* ── Map ──────────────────────────────────── */
    #mapWrap { flex: 1; position: relative; min-width: 0; }
    #map     { width: 100%; height: 100%; }

    /* ── Boat icon ────────────────────────────── */
    .bi { display: flex; flex-direction: column; align-items: center; }
    .bi-arrow {
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 20px solid #0066cc;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.35));
    }
    .bi-label {
      font-size: 11px;
      font-weight: 700;
      color: #003a8a;
      white-space: nowrap;
      margin-top: 2px;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff;
    }

    /* ── Mobile ───────────────────────────────── */
    @media (max-width: 580px) {
      .wrap { flex-direction: column; }
      aside {
        order: 2;
        width: 100%;
        min-width: 0;
        height: 190px;
        min-height: 190px;
        border-right: none;
        border-top: 1px solid #dde1e7;
      }
      #mapWrap { order: 1; flex: 1; }
      #boatList { display: flex; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; }
      .brow { min-width: 150px; border-right: 1px solid #f0f0f0; border-bottom: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">FinnTrack</div>
  <div id="pill">Connecting…</div>
</header>

<div class="wrap">
  <aside>
    <div class="aside-head">Boats on water</div>
    <div id="boatList"><div class="empty">Waiting for data…</div></div>
  </aside>
  <div id="mapWrap"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
(function () {
  'use strict';

  /* ── Config ────────────────────────────────── */
  const RACE_ID  = 'LIVE';
  const API_BASE = 'https://api.finntracker.org';
  const WS_URL   = `wss://api.finntracker.org/live?raceId=${RACE_ID}`;
  const POLL_MS  = 10000;
  const CENTER   = [-43.53, 172.63];
  const ZOOM     = 13;

  /* ── Map ───────────────────────────────────── */
  const map = L.map('map', { zoomControl: true }).setView(CENTER, ZOOM);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  /* ── Fleet lookup ──────────────────────────── */
  const fleet = {};   // boatId → { name, sail }

  fetch('/data/fleet.json')
    .then(r => r.json())
    .then(data => {
      (data.boats || data.entries || []).forEach(b => {
        fleet[b.boatId || b.id] = { name: b.name || b.skipper || b.boatId, sail: b.sail || '' };
      });
    })
    .catch(() => {});

  /* ── State ─────────────────────────────────── */
  const boats   = new Map();
  const markers = new Map();
  let ws        = null;
  let pollTimer = null;
  let fitted    = false;

  /* ── Status pill ───────────────────────────── */
  const pill = document.getElementById('pill');
  function setStatus(cls, txt) { pill.className = cls; pill.textContent = txt; }

  /* ── Marker factory ────────────────────────── */
  function makeIcon(boat) {
    const cog   = boat.cog ?? 0;
    const info  = fleet[boat.boatId] || {};
    const label = info.name || boat.name || boat.boatId;
    return L.divIcon({
      className: '',
      html: `<div class="bi">
               <div class="bi-arrow" style="transform:rotate(${cog}deg)"></div>
               <div class="bi-label">${label}</div>
             </div>`,
      iconSize:   [80, 36],
      iconAnchor: [40, 10]
    });
  }

  function makePopup(boat) {
    const info  = fleet[boat.boatId] || {};
    const name  = info.name  || boat.name || boat.boatId;
    const sail  = info.sail  ? ` &middot; ${info.sail}` : '';
    const sog   = typeof boat.sog === 'number' ? boat.sog.toFixed(1) + ' kts' : '—';
    const cog   = typeof boat.cog === 'number' ? Math.round(boat.cog) + '°'   : '—';
    const age   = boat.t ? Math.round((Date.now() - boat.t) / 1000) : null;
    const seen  = age === null ? '—' : age < 60 ? `${age}s ago` : `${Math.round(age / 60)}m ago`;
    return `<b>${name}</b>${sail}<br>Speed: ${sog} &nbsp; COG: ${cog}<br>Last seen: ${seen}`;
  }

  /* ── Upsert one boat ───────────────────────── */
  function upsert(boat) {
    if (!boat?.boatId) return;
    const lat = +boat.lat, lon = +boat.lon;
    if (!isFinite(lat) || !isFinite(lon)) return;

    boats.set(boat.boatId, boat);

    let m = markers.get(boat.boatId);
    if (!m) {
      m = L.marker([lat, lon], { icon: makeIcon(boat) }).addTo(map);
      m.on('click', () => { map.setView([lat, lon], Math.max(map.getZoom(), 15)); m.openPopup(); });
      markers.set(boat.boatId, m);
    } else {
      m.setLatLng([lat, lon]);
      m.setIcon(makeIcon(boat));
    }
    m.bindPopup(makePopup(boat));

    if (!fitted) { map.setView([lat, lon], 15); fitted = true; }
  }

  /* ── Render sidebar ────────────────────────── */
  function renderList() {
    const el = document.getElementById('boatList');
    if (boats.size === 0) { el.innerHTML = '<div class="empty">No boats yet…</div>'; return; }

    const rows = Array.from(boats.values())
      .sort((a, b) => {
        const fa = fleet[a.boatId]?.name || a.name || a.boatId;
        const fb = fleet[b.boatId]?.name || b.name || b.boatId;
        return fa.localeCompare(fb);
      })
      .map(b => {
        const info = fleet[b.boatId] || {};
        const name = info.name || b.name || b.boatId;
        const sail = info.sail ? `<span class="brow-sail">${info.sail}</span>` : '';
        const sog  = typeof b.sog === 'number' ? b.sog.toFixed(1) + ' kts' : '';
        const age  = b.t ? Math.round((Date.now() - b.t) / 1000) : null;
        const seen = age === null ? '' : age < 60 ? `${age}s ago` : `${Math.round(age / 60)}m ago`;
        const meta = [sog, seen].filter(Boolean).join(' · ');
        return `<div class="brow" data-id="${b.boatId}">
          <div class="brow-name">${name}${sail}</div>
          ${meta ? `<div class="brow-meta">${meta}</div>` : ''}
        </div>`;
      });

    el.innerHTML = rows.join('');
    el.querySelectorAll('.brow').forEach(row => {
      row.addEventListener('click', () => {
        const m = markers.get(row.dataset.id);
        if (m) { map.setView(m.getLatLng(), Math.max(map.getZoom(), 15)); m.openPopup(); }
      });
    });
  }

  /* ── Handle incoming data ──────────────────── */
  function applySnapshot(arr) {
    (Array.isArray(arr) ? arr : Object.values(arr || {})).forEach(upsert);
    renderList();
  }

  function applyPoint(boat) { upsert(boat); renderList(); }

  /* ── Polling fallback ──────────────────────── */
  async function poll() {
    try {
      const r   = await fetch(`${API_BASE}/boats?raceId=${RACE_ID}`);
      const j   = await r.json();
      const arr = j.boats || (Array.isArray(j) ? j : []);
      applySnapshot(arr);
      const n = boats.size;
      setStatus('polling', `Polling · ${n} boat${n !== 1 ? 's' : ''}`);
    } catch { setStatus('error', 'No connection'); }
  }

  function startPolling() {
    if (pollTimer) return;
    poll();
    pollTimer = setInterval(poll, POLL_MS);
  }

  function stopPolling() { clearInterval(pollTimer); pollTimer = null; }

  /* ── WebSocket ─────────────────────────────── */
  function connect() {
    if (ws) return;
    try { ws = new WebSocket(WS_URL); }
    catch { startPolling(); return; }

    setStatus('', 'Connecting…');

    ws.onopen = () => {
      stopPolling();
      setStatus('live', '● Live');
    };

    ws.onmessage = ({ data }) => {
      try {
        const m = JSON.parse(data);
        if      (m.type === 'snapshot') applySnapshot(m.boats);
        else if (m.type === 'point')    applyPoint(m.boat);
      } catch {}
    };

    ws.onclose = ev => {
      ws = null;
      if (ev.code !== 1000) {
        setStatus('polling', 'Reconnecting…');
        startPolling();
        setTimeout(() => { stopPolling(); connect(); }, 12000);
      }
    };

    ws.onerror = () => { ws = null; startPolling(); setTimeout(connect, 15000); };
  }

  /* ── Refresh last-seen timestamps ──────────── */
  setInterval(renderList, 15000);

  /* ── Boot ──────────────────────────────────── */
  connect();

})();
</script>
</body>
</html>
