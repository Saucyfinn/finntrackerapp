<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinnTrack – Live</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; }

    /* ── Header ── */
    header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      position: relative;
      z-index: 10;
    }
    .brand { font-size: 22px; font-weight: 800; color: #0066cc; }

    /* ── Status pill ── */
    #statusPill {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      background: #eee;
      color: #555;
      transition: background 0.3s, color 0.3s;
    }
    #statusPill.live    { background: #d4edda; color: #155724; }
    #statusPill.polling { background: #fff3cd; color: #856404; }
    #statusPill.error   { background: #f8d7da; color: #721c24; }

    /* ── Main layout ── */
    .layout {
      display: flex;
      height: calc(100vh - 48px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      color: #444;
      border-bottom: 1px solid #eee;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #boatList {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .boat-row {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .boat-row:hover { background: #f0f7ff; }
    .boat-row:active { background: #ddeeff; }
    .boat-name { font-weight: 700; font-size: 14px; color: #0066cc; }
    .boat-meta { font-size: 12px; color: #666; margin-top: 2px; }
    .no-boats { padding: 24px 16px; text-align: center; color: #888; font-size: 14px; }

    /* ── Map ── */
    #mapWrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Boat marker ── */
    .boat-marker-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .boat-arrow {
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 18px solid #0066cc;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .boat-label {
      font-size: 11px;
      font-weight: 700;
      color: #0066cc;
      white-space: nowrap;
      margin-top: 2px;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: 200px;
        border-right: none;
        border-top: 1px solid #e0e0e0;
        order: 2;
      }
      #mapWrap { order: 1; height: calc(100vh - 248px); }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">FinnTrack</div>
  <div id="statusPill">Connecting…</div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">Boats on water</div>
    <div id="boatList"><div class="no-boats">Waiting for boats…</div></div>
  </div>
  <div id="mapWrap">
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
(function () {
  'use strict';

  const RACE_ID   = 'LIVE';
  const API_HTTP  = 'https://api.finntracker.org';
  const API_WS    = 'wss://api.finntracker.org';
  const POLL_MS   = 5000;
  const CENTER    = [-43.7, 172.6];
  const ZOOM      = 13;

  // ── Map ──────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView(CENTER, ZOOM);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // ── State ─────────────────────────────────────────────
  const boats   = new Map();   // boatId → boat object
  const markers = new Map();   // boatId → Leaflet marker
  let ws        = null;
  let pollTimer = null;
  let fittedOnce = false;

  // ── Status ────────────────────────────────────────────
  const statusPill = document.getElementById('statusPill');
  function setStatus(cls, text) {
    statusPill.className = cls;
    statusPill.textContent = text;
  }

  // ── Boat marker ───────────────────────────────────────
  function boatIcon(boat) {
    const cog   = boat.cog ?? 0;
    const label = boat.name || boat.boatId;
    return L.divIcon({
      className: '',
      html: `<div class="boat-marker-wrap">
        <div class="boat-arrow" style="transform:rotate(${cog}deg)"></div>
        <div class="boat-label">${label}</div>
      </div>`,
      iconSize:   [60, 38],
      iconAnchor: [30, 9]   // tip of arrow
    });
  }

  function popupHtml(boat) {
    const age  = boat.t ? Math.round((Date.now() - boat.t) / 1000) : null;
    const seen = age === null ? '—'
               : age < 60    ? `${age}s ago`
               : `${Math.round(age/60)}m ago`;
    const sog  = typeof boat.sog === 'number' ? boat.sog.toFixed(1) + ' kts' : '—';
    const cog  = typeof boat.cog === 'number' ? Math.round(boat.cog) + '°' : '—';
    return `<b>${boat.name || boat.boatId}</b><br>
            Speed: ${sog}<br>
            Heading: ${cog}<br>
            Last seen: ${seen}`;
  }

  // ── Update a single boat on map + sidebar ─────────────
  function upsertBoat(boat) {
    if (!boat || !boat.boatId) return;
    const lat = Number(boat.lat);
    const lon = Number(boat.lon);
    if (!isFinite(lat) || !isFinite(lon)) return;

    boats.set(boat.boatId, boat);

    let m = markers.get(boat.boatId);
    if (!m) {
      m = L.marker([lat, lon], { icon: boatIcon(boat) }).addTo(map);
      markers.set(boat.boatId, m);
    } else {
      m.setLatLng([lat, lon]);
      m.setIcon(boatIcon(boat));
    }
    m.bindPopup(popupHtml(boat));

    // Click sidebar row → pan to boat
    m.on('click', () => map.setView([lat, lon], Math.max(map.getZoom(), 15)));

    // Fit map to all boats on first data
    if (!fittedOnce && boats.size > 0) {
      fitAll();
      fittedOnce = true;
    }
  }

  function fitAll() {
    const pts = [];
    markers.forEach(m => pts.push(m.getLatLng()));
    if (pts.length === 0) return;
    if (pts.length === 1) {
      map.setView(pts[0], 15);
    } else {
      map.fitBounds(L.latLngBounds(pts).pad(0.2));
    }
  }

  // ── Sidebar list ──────────────────────────────────────
  function renderList() {
    const el = document.getElementById('boatList');
    if (boats.size === 0) {
      el.innerHTML = '<div class="no-boats">No boats yet…</div>';
      return;
    }
    const sorted = Array.from(boats.values()).sort((a, b) =>
      (a.name || a.boatId).localeCompare(b.name || b.boatId));

    el.innerHTML = sorted.map(b => {
      const age  = b.t ? Math.round((Date.now() - b.t) / 1000) : null;
      const seen = age === null ? ''
                 : age < 60    ? `${age}s ago`
                 : `${Math.round(age/60)}m ago`;
      const sog  = typeof b.sog === 'number' ? b.sog.toFixed(1) + ' kts' : '';
      return `<div class="boat-row" data-id="${b.boatId}">
        <div class="boat-name">${b.name || b.boatId}</div>
        <div class="boat-meta">${[sog, seen].filter(Boolean).join(' · ')}</div>
      </div>`;
    }).join('');

    el.querySelectorAll('.boat-row').forEach(row => {
      row.addEventListener('click', () => {
        const m = markers.get(row.dataset.id);
        if (m) { map.setView(m.getLatLng(), Math.max(map.getZoom(), 15)); m.openPopup(); }
      });
    });
  }

  // ── Process data from WS or poll ─────────────────────
  function handleSnapshot(boatArray) {
    if (!Array.isArray(boatArray)) return;
    // Don't clear existing markers — just update
    boatArray.forEach(upsertBoat);
    renderList();
  }

  function handlePoint(boat) {
    upsertBoat(boat);
    renderList();
  }

  // ── Polling fallback ──────────────────────────────────
  async function poll() {
    try {
      const r = await fetch(`${API_HTTP}/boats?raceId=${RACE_ID}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const arr = data.boats || (Array.isArray(data) ? data : []);
      handleSnapshot(arr);
      setStatus('polling', `Polling · ${boats.size} boat${boats.size !== 1 ? 's' : ''}`);
    } catch (e) {
      setStatus('error', 'Connection error');
      console.warn('[poll]', e.message);
    }
  }

  function startPolling() {
    if (pollTimer) return;
    poll();
    pollTimer = setInterval(poll, POLL_MS);
  }

  function stopPolling() {
    clearInterval(pollTimer);
    pollTimer = null;
  }

  // ── WebSocket ─────────────────────────────────────────
  function connect() {
    if (ws) return;

    try {
      ws = new WebSocket(`${API_WS}/live?raceId=${RACE_ID}`);
    } catch (e) {
      console.warn('[ws] could not create WebSocket:', e.message);
      startPolling();
      return;
    }

    setStatus('', 'Connecting…');

    ws.onopen = () => {
      stopPolling();
      setStatus('live', 'Live ●');
      console.log('[ws] connected');
    };

    ws.onmessage = ({ data }) => {
      try {
        const msg = JSON.parse(data);
        if (msg.type === 'snapshot') {
          handleSnapshot(Array.isArray(msg.boats) ? msg.boats : Object.values(msg.boats || {}));
        } else if (msg.type === 'point') {
          handlePoint(msg.boat);
        }
      } catch (e) {
        console.warn('[ws] parse error', e);
      }
    };

    ws.onclose = (ev) => {
      console.log('[ws] closed', ev.code, ev.reason);
      ws = null;
      if (ev.code !== 1000) {
        setStatus('polling', 'Reconnecting…');
        startPolling();
        setTimeout(() => { stopPolling(); connect(); }, 10000);
      }
    };

    ws.onerror = (e) => {
      console.warn('[ws] error', e);
      ws = null;
      startPolling();
      setTimeout(connect, 15000);
    };
  }

  // Refresh popup age text every 30s
  setInterval(renderList, 30000);

  // Go
  connect();

})();
</script>
</body>
</html>
