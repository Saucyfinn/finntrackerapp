<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinnTrack – Spectator</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
    .card { max-width: 520px; margin: 24px auto; padding: 16px; border: 1px solid #eee; border-radius: 12px; }
    input, button { width: 100%; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>FinnTrack – Race View</h2>
    <input id="share" placeholder="Share code(s), comma separated" />
    <button id="go">View Race</button>
    <div id="status" style="margin-top:10px;color:#666">Idle</div>
    <p style="color:#666;margin-top:14px">This is a placeholder. The full spectator experience will link through to <a href="/live">Live</a> once the share-code mapping is finalized.</p>
  </div>

<script>
  document.getElementById("go").addEventListener("click", () => {
    const codes = (document.getElementById("share").value || "").trim();
    document.getElementById("status").textContent = codes ? ("Codes: " + codes) : "Enter a code";
  });
</script>
</body>
</html>
